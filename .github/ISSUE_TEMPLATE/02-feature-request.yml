name: Feature request
description: Propose a focused improvement to gly.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For questions or early-stage ideas, please use GitHub Discussions instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and any alternatives you considered.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include examples, mockups, or related projects when useful.
  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
