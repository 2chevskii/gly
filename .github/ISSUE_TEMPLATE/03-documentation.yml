name: Documentation improvement
description: Report an error or suggest an improvement to the documentation.
title: "[Docs]: "
labels: [documentation]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link the page or name the file and section that needs attention.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear, incorrect, or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
