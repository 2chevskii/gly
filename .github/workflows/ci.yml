name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PSRESOURCEGET_VERSION: 1.2.0

jobs:
  powershell:
    name: PowerShell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest ./src/gly.psd1

      - name: Install PSResourceGet
        shell: pwsh
        run: |
          if (-not (Get-Module Microsoft.PowerShell.PSResourceGet -ListAvailable | Where-Object Version -EQ $env:PSRESOURCEGET_VERSION)) {
            Install-PSResource Microsoft.PowerShell.PSResourceGet -Version $env:PSRESOURCEGET_VERSION -Scope CurrentUser -TrustRepository
          }

      - name: Build module package
        shell: pwsh
        run: |
          New-Item -Path ./artifacts/release -ItemType Directory -Force | Out-Null
          Compress-PSResource -Path ./src -DestinationPath ./artifacts/release

      - name: Import module
        shell: pwsh
        run: Import-Module ./src/gly.psd1 -Force

      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1
          Invoke-Pester -Path ./tests -CI

  docs:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
