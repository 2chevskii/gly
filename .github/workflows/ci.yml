name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell:
    name: PowerShell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 3.4.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest ./src/gly/gly.psd1

      - name: Import module
        shell: pwsh
        run: Import-Module ./src/gly/gly.psd1 -Force

      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 3.4.0
          Invoke-Pester ./tests -EnableExit

  docs:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
