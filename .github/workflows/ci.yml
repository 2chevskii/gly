name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  PESTER_VERSION: 5.7.1
  PSRESOURCEGET_VERSION: 1.2.0

jobs:
  tests:
    name: PowerShell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install report tooling
        run: npm ci

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion $env:PESTER_VERSION -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Import module
        shell: pwsh
        run: Import-Module ./src/gly.psd1 -Force

      - name: Run Pester and generate reports
        run: npm test -- --OutputPath './artifacts/tests/${{ matrix.os }}'

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/tests/${{ matrix.os }}
          if-no-files-found: error

  coverage:
    name: Coverage analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x

      - name: Install report tooling
        run: npm ci

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion $env:PESTER_VERSION -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run coverage analysis
        run: >-
          npm run test:coverage --
          --OutputPath './artifacts/coverage/test-run'
          --CoverageOutputPath './artifacts/coverage/coverage.cobertura.xml'

      - name: Generate coverage HTML and Markdown
        if: ${{ !cancelled() }}
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: artifacts/coverage/coverage.cobertura.xml
          targetdir: artifacts/coverage/html
          reporttypes: Html;MarkdownSummaryGithub
          title: gly coverage

      - name: Download default-branch coverage baseline
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: Legit-Labs/action-download-artifact@v2
        with:
          github_token: ${{ github.token }}
          workflow: ci.yml
          workflow_conclusion: success
          branch: master
          event: push
          name: coverage-results
          path: artifacts/baseline
          check_artifacts: true
          search_artifacts: true

      - name: Validate coverage regression
        if: ${{ !cancelled() }}
        shell: pwsh
        run: |
          ./scripts/Compare-Coverage.ps1 `
            -CurrentPath ./artifacts/coverage/coverage.cobertura.xml `
            -BaselinePath ./artifacts/baseline/coverage.cobertura.xml `
            -MaximumRegression 1.0 `
            -SummaryPath ./artifacts/coverage/CoverageRegression.md

      - name: Upload coverage results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-results
          path: artifacts/coverage
          if-no-files-found: error

  package:
    name: Build module artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest ./src/gly.psd1

      - name: Install PSResourceGet
        shell: pwsh
        run: |
          if (-not (Get-Module Microsoft.PowerShell.PSResourceGet -ListAvailable | Where-Object Version -EQ $env:PSRESOURCEGET_VERSION)) {
            Install-PSResource Microsoft.PowerShell.PSResourceGet -Version $env:PSRESOURCEGET_VERSION -Scope CurrentUser -TrustRepository
          }

      - name: Build module packages
        shell: pwsh
        run: |
          New-Item -Path ./artifacts/module -ItemType Directory -Force | Out-Null
          Compress-PSResource -Path ./src -DestinationPath ./artifacts/module
          Compress-Archive -Path ./src/* -DestinationPath ./artifacts/module/gly.zip -CompressionLevel Optimal -Force

      - name: Upload module ZIP
        uses: actions/upload-artifact@v7
        with:
          name: module-zip
          path: artifacts/module/gly.zip
          if-no-files-found: error

      - name: Upload module NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: module-nupkg
          path: artifacts/module/gly.*.nupkg
          if-no-files-found: error

  docs:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

  summary:
    name: Test and coverage summary
    if: ${{ always() && !cancelled() }}
    needs:
      - tests
      - coverage
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Download test results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          path: artifacts/summary/tests

      - name: Download coverage results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: coverage-results
          path: artifacts/summary/coverage

      - name: Publish test summary
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: artifacts/summary/tests/**/pester.ctrf.json
          title: Pester test runs
          summary-report: true
          failed-folded-report: true
          skipped-report: true
          exit-on-no-files: false
          exit-on-fail: false

      - name: Publish coverage summary
        shell: pwsh
        run: |
          $summaryFiles = @(
            './artifacts/summary/coverage/html/SummaryGithub.md',
            './artifacts/summary/coverage/CoverageRegression.md'
          )

          foreach ($summaryFile in $summaryFiles) {
            if (Test-Path -LiteralPath $summaryFile -PathType Leaf) {
              Get-Content -Raw -LiteralPath $summaryFile >> $env:GITHUB_STEP_SUMMARY
            }
          }
