name: Start release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $semverPattern = '^v(?<version>(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?)$'

          if ($tag -notmatch $semverPattern) {
            throw "Release tag '$tag' must start with 'v' and follow SemVer 2.0.0, for example v1.2.3 or v1.2.3-beta.1."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($Matches.version)" >> $env:GITHUB_OUTPUT

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --draft \
            --verify-tag \
            --title "gly ${{ steps.version.outputs.tag }}" \
            --generate-notes
