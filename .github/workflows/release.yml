name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix.
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Test and package module
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}' -replace '^v', ''
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Release version is empty.'
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 3.4.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest ./src/gly/gly.psd1

      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 3.4.0
          Invoke-Pester ./tests -EnableExit

      - name: Package module
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path ./src/gly/* -DestinationPath "./artifacts/gly-${{ steps.version.outputs.version }}.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gly-${{ steps.version.outputs.version }}
          path: artifacts/gly-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: gly v${{ steps.version.outputs.version }}
          files: artifacts/gly-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
