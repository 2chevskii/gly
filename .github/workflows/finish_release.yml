name: Finish release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  PSRESOURCEGET_VERSION: 1.2.0

jobs:
  release-metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.version.outputs.package }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate release tag and module version
        id: version
        shell: pwsh
        run: |
          $tag = '${{ github.event.release.tag_name }}'
          $stableTagPattern = '^v(?<version>(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*))$'

          if ($tag -notmatch $stableTagPattern) {
            throw "Release tag '$tag' must follow the stable version format vX.Y.Z."
          }

          $version = $Matches.version
          $manifest = Test-ModuleManifest ./src/gly.psd1

          if ($manifest.Version.ToString() -ne $version) {
            throw "ModuleVersion '$($manifest.Version)' must match release tag version '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "package=gly.$version.nupkg" >> $env:GITHUB_OUTPUT

  publish-powershell-gallery:
    name: Publish to PowerShell Gallery
    needs: release-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Install PSResourceGet
        shell: pwsh
        run: |
          if (-not (Get-Module Microsoft.PowerShell.PSResourceGet -ListAvailable | Where-Object Version -EQ $env:PSRESOURCEGET_VERSION)) {
            Install-PSResource Microsoft.PowerShell.PSResourceGet -Version $env:PSRESOURCEGET_VERSION -Scope CurrentUser -TrustRepository
          }

      - name: Download release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/release
          gh release download '${{ github.event.release.tag_name }}' \
            --repo '${{ github.repository }}' \
            --pattern '${{ needs.release-metadata.outputs.package }}' \
            --dir artifacts/release

      - name: Publish package
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw 'Repository secret PSGALLERY_API_KEY is required to publish to PowerShell Gallery.'
          }

          Publish-PSResource `
            -NupkgPath './artifacts/release/${{ needs.release-metadata.outputs.package }}' `
            -Repository PSGallery `
            -ApiKey $env:PSGALLERY_API_KEY `
            -Verbose

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: release-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install PSResourceGet
        shell: pwsh
        run: |
          if (-not (Get-Module Microsoft.PowerShell.PSResourceGet -ListAvailable | Where-Object Version -EQ $env:PSRESOURCEGET_VERSION)) {
            Install-PSResource Microsoft.PowerShell.PSResourceGet -Version $env:PSRESOURCEGET_VERSION -Scope CurrentUser -TrustRepository
          }

      - name: Download release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/release
          gh release download '${{ github.event.release.tag_name }}' \
            --repo '${{ github.repository }}' \
            --pattern '${{ needs.release-metadata.outputs.package }}' \
            --dir artifacts/release

      - name: Publish package
        shell: pwsh
        env:
          GITHUB_PACKAGES_TOKEN: ${{ github.token }}
        run: |
          $repositoryName = 'GitHubPackages'
          $repositoryUri = 'https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json'
          Register-PSResourceRepository -Name $repositoryName -Uri $repositoryUri -Trusted

          $secureToken = ConvertTo-SecureString $env:GITHUB_PACKAGES_TOKEN -AsPlainText -Force
          $credential = [pscredential]::new('${{ github.actor }}', $secureToken)

          Publish-PSResource `
            -NupkgPath './artifacts/release/${{ needs.release-metadata.outputs.package }}' `
            -Repository $repositoryName `
            -Credential $credential `
            -Verbose
